<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>빨래도우미</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape shape-a"></div>
  <div class="bg-shape shape-b"></div>

  <header class="topbar">
    <div>
      <p class="brand">Laundry Flow</p>
      <h1>빨래도우미</h1>
    </div>
    <button id="todayStartBtn" class="primary-btn">오늘 세탁 시작</button>
  </header>

  <main class="layout">
    <section class="card home-card">
      <h2>오늘의 추천</h2>
      <div class="weather-grid">
        <label>지역 선택
          <select id="locationSelect">
            <optgroup label="특별·광역시">
              <option value="서울" selected>서울</option>
              <option value="부산">부산</option>
              <option value="인천">인천</option>
              <option value="대구">대구</option>
              <option value="대전">대전</option>
              <option value="광주">광주</option>
              <option value="울산">울산</option>
              <option value="세종">세종</option>
            </optgroup>
            <optgroup label="경기권">
              <option value="수원">수원</option>
              <option value="고양">고양</option>
              <option value="용인">용인</option>
              <option value="성남">성남</option>
              <option value="부천">부천</option>
              <option value="안산">안산</option>

              <option value="평택">평택</option>
              <option value="의정부">의정부</option>
              <option value="파주">파주</option>
              <option value="김포">김포</option>
              <option value="하남">하남</option>
              <option value="시흥">시흥</option>
              <option value="광명">광명</option>
              <option value="군포">군포</option>
              <option value="오산">오산</option>
              <option value="이천">이천</option>
              <option value="구리">구리</option>
              <option value="안성">안성</option>
              <option value="양주">양주</option>
            </optgroup>
            <optgroup label="강원권">
              <option value="춘천">춘천</option>
              <option value="원주">원주</option>
              <option value="강릉">강릉</option>
              <option value="속초">속초</option>
              <option value="동해">동해</option>
              <option value="태백">태백</option>
              <option value="삼척">삼척</option>
              <option value="홍천">홍천</option>
              <option value="횡성">횡성</option>
              <option value="영월">영월</option>
              <option value="평창">평창</option>
              <option value="정선">정선</option>
              <option value="철원">철원</option>
              <option value="화천">화천</option>
              <option value="양구">양구</option>
              <option value="인제">인제</option>
              <option value="고성(강원)">고성(강원)</option>
              <option value="양양">양양</option>
            </optgroup>
            <optgroup label="충청권">
              <option value="청주">청주</option>
              <option value="천안">천안</option>
              <option value="충주">충주</option>
              <option value="제천">제천</option>
              <option value="아산">아산</option>
              <option value="서산">서산</option>
              <option value="공주">공주</option>
              <option value="보령">보령</option>
              <option value="논산">논산</option>
              <option value="계룡">계룡</option>
              <option value="당진">당진</option>
              <option value="보은">보은</option>
              <option value="옥천">옥천</option>
              <option value="영동">영동</option>
              <option value="증평">증평</option>
              <option value="진천">진천</option>
              <option value="괴산">괴산</option>
              <option value="음성">음성</option>
              <option value="단양">단양</option>
              <option value="금산">금산</option>
              <option value="부여">부여</option>
              <option value="서천">서천</option>
              <option value="청양">청양</option>
              <option value="홍성">홍성</option>
              <option value="예산">예산</option>
              <option value="태안">태안</option>
            </optgroup>
            <optgroup label="전라권">
              <option value="전주">전주</option>
              <option value="군산">군산</option>
              <option value="익산">익산</option>
              <option value="남원">남원</option>
              <option value="목포">목포</option>
              <option value="여수">여수</option>
              <option value="순천">순천</option>
              <option value="광양">광양</option>
              <option value="정읍">정읍</option>
              <option value="김제">김제</option>
              <option value="완주">완주</option>
              <option value="진안">진안</option>
              <option value="무주">무주</option>
              <option value="장수">장수</option>
              <option value="임실">임실</option>
              <option value="순창">순창</option>
              <option value="고창">고창</option>
              <option value="부안">부안</option>
              <option value="나주">나주</option>
              <option value="담양">담양</option>
              <option value="곡성">곡성</option>
              <option value="구례">구례</option>
              <option value="고흥">고흥</option>
              <option value="보성">보성</option>
              <option value="화순">화순</option>
              <option value="장흥">장흥</option>
              <option value="강진">강진</option>
              <option value="해남">해남</option>
              <option value="영암">영암</option>
              <option value="무안">무안</option>
              <option value="함평">함평</option>
              <option value="영광">영광</option>
              <option value="장성">장성</option>
              <option value="완도">완도</option>
              <option value="진도">진도</option>
              <option value="신안">신안</option>
            </optgroup>
            <optgroup label="경상권">
              <option value="포항">포항</option>
              <option value="창원">창원</option>
              <option value="김해">김해</option>
              <option value="진주">진주</option>
              <option value="구미">구미</option>
              <option value="경주">경주</option>
              <option value="안동">안동</option>
              <option value="김천">김천</option>
              <option value="통영">통영</option>
              <option value="거제">거제</option>
              <option value="양산">양산</option>
              <option value="영주">영주</option>
              <option value="영천">영천</option>
              <option value="상주">상주</option>
              <option value="문경">문경</option>
              <option value="경산">경산</option>
              <option value="군위">군위</option>
              <option value="의성">의성</option>
              <option value="청송">청송</option>
              <option value="영양">영양</option>
              <option value="영덕">영덕</option>
              <option value="청도">청도</option>
              <option value="고령">고령</option>
              <option value="성주">성주</option>
              <option value="칠곡">칠곡</option>
              <option value="예천">예천</option>
              <option value="봉화">봉화</option>
              <option value="울진">울진</option>
              <option value="울릉">울릉</option>
              <option value="사천">사천</option>
              <option value="밀양">밀양</option>
              <option value="거창">거창</option>
              <option value="합천">합천</option>
              <option value="함양">함양</option>
              <option value="산청">산청</option>
              <option value="하동">하동</option>
              <option value="남해">남해</option>
              <option value="고성(경남)">고성(경남)</option>
              <option value="창녕">창녕</option>
              <option value="함안">함안</option>
              <option value="의령">의령</option>
            </optgroup>
            <optgroup label="제주권">
              <option value="제주">제주</option>
              <option value="서귀포">서귀포</option>
            </optgroup>
          </select>
        </label>
        <button id="weatherFetchBtn" class="ghost-btn" type="button">AI 추천 갱신</button>
      </div>
      <div class="location-tools">
        <button id="toggleFavoriteBtn" class="ghost-btn" type="button">자주 쓰는 지역으로 저장</button>
        <p id="favoriteStatus" class="meta">즐겨찾기 지역이 없습니다.</p>
      </div>
      <p id="weatherMeta" class="meta"></p>
      <div id="weatherFacts" class="weather-facts"></div>
    </section>

    <section class="card notify-card">
      <h2>알림 설정</h2>
      <div class="notify-row">
        <button id="notifPermissionBtn" class="ghost-btn" type="button">브라우저 알림 권한 요청</button>
        <span id="notifStatus" class="meta"></span>
      </div>
      <div id="weatherResult" class="recommend-card"></div>
    </section>

    <nav class="tabs" aria-label="핵심 기능 메뉴">
      <button class="tab active" data-target="schedule">일정</button>
      <button class="tab" data-target="care">의류 케어</button>
      <button class="tab" data-target="inventory">재고</button>
      <button class="tab" data-target="share">공유 보드</button>
    </nav>

    <section id="panelZone" class="panel-zone panel-zone--schedule" aria-live="polite">
      <section id="schedule" class="card panel active">
        <h2>세탁 일정 관리</h2>
        <form id="scheduleForm" class="inline-form">
          <input id="scheduleDate" type="date" required />
          <input id="scheduleTime" type="time" required />
          <select id="schedulePhase">
            <option value="세탁">세탁</option>
            <option value="건조">건조</option>
            <option value="정리">정리</option>
          </select>
          <select id="scheduleStatus">
            <option value="예정">예정</option>
            <option value="진행 중">진행 중</option>
            <option value="완료">완료</option>
          </select>
          <select id="scheduleRepeat">
            <option value="none">반복 없음</option>
            <option value="weekly">매주</option>
            <option value="biweekly">격주</option>
            <option value="monthly">매월</option>
          </select>
          <input id="scheduleNote" type="text" placeholder="메모 예: 운동복 먼저 세탁" maxlength="60" />
          <button class="primary-btn" type="submit">추가</button>
        </form>

        <div class="calendar-head">
          <div class="calendar-switch">
            <button id="monthViewBtn" class="ghost-btn active" type="button">월간</button>
            <button id="weekViewBtn" class="ghost-btn" type="button">주간</button>
          </div>
          <div class="calendar-nav">
            <button id="calendarPrevBtn" class="ghost-btn" type="button">이전</button>
            <strong id="calendarLabel"></strong>
            <button id="calendarNextBtn" class="ghost-btn" type="button">다음</button>
          </div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
        <ul id="scheduleList" class="list"></ul>
      </section>

      <section id="care" class="card panel">
        <h2>의류 케어 가이드</h2>
        <div class="inline-form">
          <select id="fabricInput">
            <option value="면">면</option>
            <option value="울">울</option>
            <option value="데님">데님</option>
            <option value="합성섬유">합성섬유</option>
            <option value="린넨">린넨</option>
          </select>
          <input id="labelCodeInput" type="text" placeholder="라벨 코드 예: 30C" maxlength="12" />
          <button id="careGuideBtn" class="primary-btn" type="button">가이드 보기</button>
        </div>
        <p class="helper-text">라벨 코드는 옷 안쪽 목 뒷부분이나 옆선에 붙은 세탁 라벨에서 확인할 수 있어요. 숫자(30, 40)는 권장 물 온도, 기호(세탁통/삼각형/다리미)는 세탁·표백·다림질 가능 여부를 뜻합니다.</p>
        <div id="careResult" class="guide-card"></div>
      </section>

      <section id="inventory" class="card panel">
        <h2>세제/유연제 재고</h2>
        <form id="itemForm" class="inline-form">
          <input id="itemName" type="text" placeholder="품목명 예: 액체세제" required maxlength="20" />
          <input id="itemTotal" type="number" placeholder="전체 용량 예: 2000 (ml)" min="1" required />
          <input id="itemCurrent" type="number" placeholder="남은 양 예: 650 (ml)" min="0" required />
          <button class="primary-btn" type="submit">품목 추가</button>
        </form>
        <ul id="inventoryList" class="list"></ul>
      </section>

      <section id="share" class="card panel">
        <h2>가족/룸메이트 공유 보드</h2>
        <div class="rule-card">
          <h3>운영 규칙</h3>
          <form id="rulesForm" class="inline-form rules-form">
            <input id="inventoryThresholdInput" type="number" min="5" max="80" placeholder="재고 기준치(%) 예: 30" required />
            <input id="taskCutoffInput" type="time" required />
            <button class="ghost-btn" type="submit">규칙 저장</button>
          </form>
          <p id="rulesMeta" class="meta"></p>
        </div>
        <form id="memberForm" class="inline-form">
          <input id="memberName" type="text" placeholder="이름 예: 엄마" required maxlength="15" />
          <button class="ghost-btn" type="submit">구성원 추가</button>
        </form>
        <form id="taskForm" class="inline-form">
          <input id="taskTitle" type="text" placeholder="할 일 예: 수건 세탁" required maxlength="30" />
          <select id="taskAssignee"></select>
          <input id="taskTime" type="datetime-local" required />
          <button class="primary-btn" type="submit">작업 배정</button>
        </form>
        <ul id="taskList" class="list"></ul>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
